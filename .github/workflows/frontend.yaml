name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/pico_teleop_web/**'
      - '.github/workflows/frontend.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'src/pico_teleop_web/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/pico_teleop_web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/pico_teleop_web/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/pico_teleop_web/dist/
          retention-days: 7
