# Franka Panda single arm configuration
arm:
  name: franka_single
  type: single
  dof: 7
  urdf_path: $(find pico_teleop_bringup)/config/arms/franka.urdf
  base_frame: panda_link0
  ee_frame: panda_hand
  has_gripper: true

  joint_names:
    - panda_joint1
    - panda_joint2
    - panda_joint3
    - panda_joint4
    - panda_joint5
    - panda_joint6
    - panda_joint7

  workspace:
    x_min: -0.8
    x_max: 0.8
    y_min: -0.8
    y_max: 0.8
    z_min: 0.0
    z_max: 1.2

  retarget:
    workspace_scale: 1.0
    origin_offset: [0.0, 0.0, 0.5]

  limits:
    max_velocity: [2.175, 2.175, 2.175, 2.175, 2.61, 2.61, 2.61]
    max_acceleration: [15.0, 7.5, 10.0, 12.5, 15.0, 20.0, 20.0]
    max_jerk: [7500.0, 3750.0, 5000.0, 6250.0, 7500.0, 10000.0, 10000.0]
